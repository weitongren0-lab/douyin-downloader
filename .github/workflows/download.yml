name: Douyin Link Collector

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install -U yt-dlp requests beautifulsoup4

      - name: Collect links
        run: |
          python << 'EOF'
          import re
          import requests

          url = "https://www.douyin.com/user/MS4wLjABAAAA1__BtRoq5zyQorzwAlok3PppNiY91epHDw7TSuqtOtES79pfVefdMo4TAfukKXM1"

          headers = {
              "User-Agent": "Mozilla/5.0"
          }

          r = requests.get(url, headers=headers, timeout=30)

          html = r.text

          links = set()

          patterns = [
              r'https://www\.douyin\.com/video/\d+',
              r'https:\\/\\/www\.douyin\.com\\/video\\/\d+'
          ]

          for p in patterns:
              for m in re.findall(p, html):
                  links.add(m.replace("\\/", "/"))

          with open("links.txt", "w", encoding="utf-8") as f:
              for link in sorted(links):
                  f.write(link + "\n")

          print("Collected:", len(links), "links")
          EOF

      - name: Show collected links
        run: |
          cat links.txt || true

      - name: Download videos
        run: |
          if [ -s links.txt ]; then
            yt-dlp \
              --ignore-errors \
              --continue \
              --no-overwrites \
              -a links.txt
          else
            echo "No links found"
          fi

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: douyin-downloads
          path: .
